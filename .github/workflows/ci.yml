name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync --locked
      - run: uv run pytest
      - run: uv run ruff check tinax tests examples
      - run: uv run ty check tinax tests examples

  build:
    name: Build and validate package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync --locked
      - run: uv run pytest
      - run: uv run ruff check tinax tests examples
      - run: uv run ty check tinax tests examples
      - run: uv build
      - run: uv run twine check dist/*
      - run: uv run zensical build --strict
      - run: uv venv --python 3.14 /tmp/tinax-wheel-check
      - run: uv pip install --python /tmp/tinax-wheel-check/bin/python dist/*.whl
      - run: /tmp/tinax-wheel-check/bin/python -I -c "import sys, tinax; assert not any(name == 'jax' or name.startswith('jax.') for name in sys.modules)"
      - uses: actions/upload-artifact@v4
        with:
          name: tinax-distributions
          path: dist/
          if-no-files-found: error
