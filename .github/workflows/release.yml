name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify tag matches pyproject.toml version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag v$tag_version does not match pyproject.toml version $pkg_version" >&2
            exit 1
          fi
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync --locked
      - run: uv run pytest
      - run: uv run ruff check tinax tests examples
      - run: uv run ty check tinax tests examples
      - run: uv run zensical build --strict
      - run: uv build
      - run: uv run twine check dist/*
      - run: |
          for py in 3.12 3.13 3.14; do
            uv venv --python "$py" "/tmp/tinax-release-check-$py"
            uv pip install --python "/tmp/tinax-release-check-$py/bin/python" dist/*.whl
            "/tmp/tinax-release-check-$py/bin/python" -I -c "import sys, tinax; assert not any(name == 'jax' or name.startswith('jax.') for name in sys.modules)"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: tinax-dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/tinax/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: tinax-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          name: tinax-dist
          path: dist
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/* --title "Tinax ${{ github.ref_name }}" --generate-notes
